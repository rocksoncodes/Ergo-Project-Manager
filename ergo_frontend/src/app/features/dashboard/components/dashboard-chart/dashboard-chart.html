<!--::begin Performance Chart    -->
<div class="row card p-lg-3 m-auto border-0 shadow-sm mb-5">
  <h6 class="card-subtitle fw-semibold p-lg-3">Performance Overview</h6>
  <div class="chart-container card-body p-0">
    <canvas
      baseChart
      role="img"
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
      [legend]="false"></canvas>
  </div>
</div>
<!--::end Performance Chart    -->
